{% extends 'base.html' %}
{% block title %}Blue Team Flags{% endblock %}

{% block head %}
{{ super() }}
<script src="{{ url_for('static', filename='vendor/js/jquery.dataTables.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/js/dataTables.bootstrap.min.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/css/dataTables.bootstrap.min.css') }}" />

<style>
  .status-pill {
    display: inline-block;
    padding: 6px 12px;
    color: white;
    border-radius: 999px;
    font-weight: bold;
    text-align: center;
    white-space: nowrap;
  }

  .status-healthy { background: #08680d; }
  .status-compromised, .status-comp { background: #b30000; }
  .status-offline { background: #5f6368; }
  .status-unknown { background: #6c757d; }


  .box-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .history-wrapper {
  overflow-x: auto;
  max-width: 100%;
}

#historyTable {
  white-space: nowrap;
}

  table {
    margin: auto;
    border-collapse: collapse;
  }

  th, td {
    padding: 6px;
    text-align: center;
  }

  /* Error banner style */
  #backendError {
    display: none;
    background: #f39c12;
    color: white;
    padding: 8px;
    text-align: center;
    font-weight: bold;
    margin-bottom: 20px;
  }
</style>
{% endblock %}

{% block content %}
<div id="section-active" class="dashboard-section">
<h2 class="text-center">Active Machine Status</h2>

<!-- Backend error notification -->
<div id="backendError">Backend unavailable – displaying last known state</div>

<table id="activeTable" class="table table-striped table-bordered">
  <tbody></tbody>
</table>
</div>

<div id="section-historical" class="dashboard-section">
  <h2 class="text-center">History</h2>
  <div class="history-wrapper">
    <table id="historyTable" class="table table-striped table-bordered">
      <thead>
        <tr id="timeRow">
          <th>Box</th>
        </tr>
      </thead>
    <tbody id="historyBody"></tbody>
  </table>
</div>
</div>

<script>
/* ---------------- CONFIG ---------------- */

const MAX_COLUMNS = 10;
const UPDATE_INTERVAL = 30000; // 30 seconds for testing 1800000 for 30

// Boxes and currentStatus start empty and get initialized by api
let boxes = [];
let currentStatus = [];

let permissions = {
  current_enabled: false,
  historical_enabled: false
};

let statusInterval = null;
let historyInterval = null;


function normalizeStatus(raw) {
  const s = String(raw || 'unknown').toLowerCase();
  if (['healthy', 'compromised', 'offline', 'unknown'].includes(s)) return s;
  return 'unknown';
}

function statusLabel(status) {
  const s = normalizeStatus(status);
  if (s === 'healthy') return 'Healthy ✔';
  if (s === 'compromised') return 'Compromised ✖';
  if (s === 'offline') return 'Offline ✖';
  return 'Unknown ✖';
}
function getColumnCount(total){
  if (total <= 14) return 2;
  if (total <= 24) return 3;
  return 4;
}
// backend error handleling
let backendHealthy = true;

async function fetchPermissions() {
  try {
    const res = await fetch('/admin/permissions', { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const json = await res.json();

    permissions.current_enabled = !!json.current_enabled;
    permissions.historical_enabled = !!json.historical_enabled;

    // Show / hide sections
    document.getElementById('section-active').style.display =
      permissions.current_enabled ? 'block' : 'none';

    document.getElementById('section-historical').style.display =
      permissions.historical_enabled ? 'block' : 'none';

    return true;
  } catch (err) {
    console.error("Permissions fetch failed:", err);
    return false;
  }
}

// Start UI 

function init() {
  const tbody = document.querySelector('#activeTable tbody');
  tbody.innerHTML = '';

  const total = boxes.length;
  const columns = getColumnCount(total);
  const rows = Math.ceil(total / columns);

  let boxIndex = 0;

  for (let r = 0; r < rows; r++) {
    const row = document.createElement('tr');

    for (let c = 0; c < columns; c++) {
      if (boxIndex < total) {

        const idCell = document.createElement('td');
        idCell.textContent = `Box ${boxes[boxIndex].id}`;
        row.appendChild(idCell);

        const statusCell = document.createElement('td');
        statusCell.id = `active-${boxIndex}`;
        statusCell.innerHTML = `<span class="status-pill"></span>`;
        row.appendChild(statusCell);

        boxIndex++;
      }
    }

    tbody.appendChild(row);
  }

  // Build history rows
  const body = document.getElementById('historyBody');
  body.innerHTML = '';

  boxes.forEach((b, i) => {
    const tr = document.createElement('tr');
    tr.dataset.index = i;
    tr.innerHTML = `<td>Box ${b.id}</td>`;
    body.appendChild(tr);
  });
}

// Render current status

function renderActive() {
  currentStatus.forEach((st, i) => {
    const pill = document.querySelector(`#active-${i} .status-pill`);
    if (!pill) return;
    const normalized = normalizeStatus(st);
    pill.className = `status-pill status-${normalized}`;
    pill.textContent = statusLabel(normalized);
  });
}

// Create banner if there is an error

function showErrorBanner() {
  document.getElementById('backendError').style.display = 'block';
}

function clearErrorBanner() {
  document.getElementById('backendError').style.display = 'none';
}

// fetch API 

async function fetchCurrentStatus() {
  try {
    const res = await fetch('/api/status', { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const json = await res.json();
    if (!json || !Array.isArray(json.data)) {
      throw new Error('Invalid /api/status response');
    }

    const machines = json.data
      .slice()
      .sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));

    const machineNames = machines.map(m => m.name || `machine-${m.id}`);
    if (boxes.length !== machineNames.length || boxes.some((b, i) => b.id !== machineNames[i])) {
      boxes = machineNames.map(name => ({ id: name }));
      currentStatus = new Array(boxes.length).fill('unknown');
      init();
    }

    currentStatus = machines.map(m => normalizeStatus(m.status));

    clearErrorBanner();
    renderActive();
    return true;
  } catch (err) {
    console.error('Backend error:', err);
    showErrorBanner();
    return false;
  }
}
async function fetchMachineHistory(teamId) {
  try {
    const res = await fetch(`/api/team/${teamId}/machine-history`, {
      cache: 'no-store'
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const json = await res.json();
    if (!json || !json.data) {
      throw new Error('Invalid history response');
    }

    renderHistory(json.data);
  } catch (err) {
    console.error("History fetch failed:", err);
    showErrorBanner();
  }
}
// Using backend to create history

function renderHistory(data) {
  const timeRow = document.getElementById('timeRow');
  const body = document.getElementById('historyBody');

  // Clear existing content
  timeRow.innerHTML = '<th>Box</th>';
  body.innerHTML = '';

  // Create column headers
  data.columns.forEach(col => {
    const th = document.createElement('th');
    th.textContent = col.label;
    timeRow.appendChild(th);
  });

  // Create rows
  data.rows.forEach(row => {
    const tr = document.createElement('tr');

    // First column = host
    const nameTd = document.createElement('td');
    nameTd.textContent = row.host;
    tr.appendChild(nameTd);

    // History booleans → status pills
    row.history.forEach(value => {
		const td = document.createElement('td');

		let status;
		if (value === true) {
			status = 'compromised';
		} else if (value === false) {
			status = 'healthy';
		} else {
			status = 'offline';
		}

		td.innerHTML = `
			<span class="status-pill status-${status}">
			${statusLabel(status)}
		</span>
		`;

  tr.appendChild(td);
});

    body.appendChild(tr);
  });
}

// Creating everything 


(async function main() {
  const TEAM_ID = {{ team.id }};

  // Fetch permissions
  const ok = await fetchPermissions();
  if (!ok) return;


  if (permissions.current_enabled) {
    await fetchCurrentStatus();
    statusInterval = setInterval(fetchCurrentStatus, UPDATE_INTERVAL);
  }

  if (permissions.historical_enabled) {
    await fetchMachineHistory(TEAM_ID);
    historyInterval = setInterval(
      () => fetchMachineHistory(TEAM_ID),
      UPDATE_INTERVAL
    );
  }
})();
</script>

{% endblock %}
