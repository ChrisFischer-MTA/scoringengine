{% extends 'base.html' %}
{% block title %}Blue Team Flags{% endblock %}

{% block head %}
{{ super() }}
<script src="{{ url_for('static', filename='vendor/js/jquery.dataTables.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/js/dataTables.bootstrap.min.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/css/dataTables.bootstrap.min.css') }}" />

<style>
  .status-pill {
    display: inline-block;
    padding: 6px 12px;
    color: white;
    border-radius: 999px;
    font-weight: bold;
    text-align: center;
    white-space: nowrap;
  }
  .status-healthy { background: #08680d; }
  .status-comp { background: #b30000 }
  .flex-row {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-top: 20px;
  }
  .box-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  table {
    margin: auto;
    border-collapse: collapse;
  }
  th, td {
    padding: 6px;
  }
</style>
{% endblock %}

{% block content %}

<h2 class="text-center">Active Flags</h2>
<table id="activeTable" class="table table-striped table-bordered table-compact" cellspacing="0" width="100%">
  <tbody></tbody>
</table>

<h2 class="text-center">History</h2>
<table id="historyTable" class="table table-striped table-bordered table-compact" cellspacing="0" width="100%">
  <thead>
    <tr id="timeRow">
      <th>Box</th>
    </tr>
  </thead>
  <tbody id="historyBody"></tbody>
</table>

<script>
const MAX_COLUMNS = 8;

/* Active Flags eventually pull list from api this is template with mock data and history idea*/

const boxes = [
  { id: 1 }, { id: 2 }, { id: 3 }, { id: 4 }, { id: 5 },
  { id: 6 }, { id: 7 }, { id: 8 }, { id: 9 }, { id: 10 }
];

// initial history state (one entry per box)
let currentStatus = boxes.map(() => Math.random() > 0.3 ? 'healthy' : 'comp');

function getColumnCount(total){
if(total <= 14) return 2;
if (total <= 24) return 3;
return 4;
}

// build Active Flags + history rows
function init() {
  const tbody = document.querySelector('#activeTable tbody');
  tbody.innerHTML = '';

  const total = boxes.length;
  const columns = getColumnCount(total);   // number of BOXES per row
  const rows = Math.ceil(total / columns);

  let boxIndex = 0;

  for (let r = 0; r < rows; r++) {
    const row = document.createElement('tr');

    for (let c = 0; c < columns; c++) {

      if (boxIndex < total) {

        // --- Box ID cell ---
        const idCell = document.createElement('td');
        idCell.textContent = `Box ${boxes[boxIndex].id}`;
        row.appendChild(idCell);

        // --- Status cell ---
        const statusCell = document.createElement('td');
        statusCell.id = `active-${boxIndex}`;
        statusCell.innerHTML = `<span class="status-pill"></span>`;
        row.appendChild(statusCell);

        boxIndex++;
      }
    }

    tbody.appendChild(row);
  }

  // build history rows (unchanged)
  const body = document.getElementById('historyBody');
  body.innerHTML = '';

  boxes.forEach((b, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>Box ${b.id}</td>`;
    tr.dataset.index = i;
    body.appendChild(tr);
  });

  renderActive();
}



function renderActive() {
  currentStatus.forEach((st, i) => {
    const pill = document.querySelector(`#active-${i} .status-pill`);
    if (!pill) return;

    pill.className = `status-pill status-${st}`;
    pill.textContent = st === 'healthy' ? 'Healthy ✔' : 'Compromised ✖';
  });
}


// adding new column at update time

function addHistoryColumn() {
  const timestamp = new Date().toLocaleTimeString();
  const timeRow = document.getElementById('timeRow');

  // add new time header (to the left)
  const th = document.createElement('th');
  th.textContent = timestamp;
  timeRow.insertBefore(th, timeRow.children[1]);

  // update statuses (placeholder logic)
  currentStatus = currentStatus.map(() =>
    Math.random() > 0.3 ? 'healthy' : 'comp'
  );

  // add cells to each row
  document.querySelectorAll('#historyBody tr').forEach((row, i) => {
  const td = document.createElement('td');
	const st = currentStatus[i];

	td.innerHTML = `
		<span class="status-pill status-${st}">
		${st === 'healthy' ? 'Healthy ✔' : 'Compromised ✖'}
		</span>
		`;

	row.insertBefore(td, row.children[1]);

  });

  renderActive();

  // trim old columns
  while (timeRow.children.length > MAX_COLUMNS + 1) {
    timeRow.removeChild(timeRow.lastChild);
    document.querySelectorAll('#historyBody tr').forEach(row => {
      row.removeChild(row.lastChild);
    });
  }
}

//starting

init();
// setInterval(addHistoryColumn, 1800000); // real timing
setInterval(addHistoryColumn, 5000);       // demo
</script>

{% endblock %}
