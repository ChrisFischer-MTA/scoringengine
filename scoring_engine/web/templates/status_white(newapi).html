{{ super() }}

<style>
.flag-healthy {
    background-color: #2ecc71;
    color: white;
    font-weight: bold;
    border-radius: 20px;
    padding: 4px 10px;
    display: inline-block;
}
.flag-compromised {
    background-color: #e74c3c;
    color: white;
    font-weight: bold;
    border-radius: 20px;
    padding: 4px 10px;
    display: inline-block;
}
</style>
{% endblock %}

{% block content %}

<div class="container-fluid px-4 py-4">
<div class="row">
        <h2 class="text-center mb-4">Active Flags</h2>

    <div class="table-responsive">
        <table id="solves" class="table table-striped table-bordered table-compact" cellspacing="0" width="100%">
            <thead>
                <tr>
                </tr>
            </thead>
        </table>
    </div>
    <div class="row">
</div>

<script>
<script>
$(document).ready(function () {
    $.ajax({
        url: '/api/status',
        success: function (response) {

            if (!response.data || !Array.isArray(response.data)) {
                console.error("Invalid API format");
                return;
            }

            const machines = response.data;

            $('#solves').DataTable({
                data: machines,
                ordering: false,
                columns: [
                    {
                        title: "Team Name
                        data: "team_id"
                    },
                    {
                        title: "Machine Name",
                        data: "name"
                    },
                    {
                        title: "Status",
                        data: "status",
                        render: function (data) {
                            if (data === "compromised") {
                                return '<span class="flag-compromised">Compromised ✖</span>';
                            }
                            if (data === "healthy") {
                                return '<span class="flag-healthy">Healthy ✔</span>';
                            }
                            return data;
                        }
                    },
                    {
                        title: "Last Check In",
                        data: "last_check_in_at"
                    }
                ]
            });
        },
        error: function (xhr, status, error) {
            console.error("Error fetching data:", error);
        }
    });
});
</script>

{% endblock %}
