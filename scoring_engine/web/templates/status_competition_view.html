{% extends 'base.html' %}

{% block title %}Stats{% endblock %}

{% block head %}
{{ super() }}

<script src="{{ url_for('static', filename='vendor/js/jquery.dataTables.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/js/dataTables.bootstrap.min.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='vendor/css/dataTables.bootstrap.min.css') }}" />

<style>
.flag-healthy {
    background-color: #2ecc71;
    color: white;
    font-weight: bold;
    border-radius: 20px;
    padding: 4px 10px;
    display: inline-block;
}
.flag-compromised {
    background-color: #e74c3c;
    color: white;
    font-weight: bold;
    border-radius: 20px;
    padding: 4px 10px;
    display: inline-block;
}
.flag-offline {
    background-color: #5f6368;
    color: white;
    font-weight: bold;
    border-radius: 20px;
    padding: 4px 10px;
    display: inline-block;
}
.flag-unknown {
    background-color: #6c757d;
    color: white;
    font-weight: bold;
    border-radius: 20px;
    padding: 4px 10px;
    display: inline-block;
}
</style>
{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="row">
        <h1 class="text-center mb-4">Active Machines</h1>

        <div class="table-responsive" role="region" aria-label="Active machines table" aria-live="polite">
            <table id="solves" class="table table-striped table-bordered table-compact" cellspacing="0" width="100%">
                <caption class="sr-only">Table of active machines with team, name, status, and last check-in time</caption>
                <thead>
                    <tr></tr>
                </thead>
            </table>
        </div>
    </div>
</div>

<script>
$(document).ready(function () {
    $.ajax({
        url: '/api/status',
        success: function (response) {
            if (!response.data || !Array.isArray(response.data)) {
                console.error("Invalid API format");
                return;
            }

            const machines = response.data;

            $('#solves').DataTable({
                data: machines,
                ordering: false,
                columns: [
                    { title: "Team Name", data: "team_id" },
                    { title: "Machine Name", data: "name" },
                    {
                        title: "Status",
                        data: "status",
                        render: function (data) {
                            if (data === "compromised") {
                                return '<span class="flag-compromised" role="status">Compromised ✖</span>';
                            }
                            if (data === "healthy") {
                                return '<span class="flag-healthy" role="status">Healthy ✔</span>';
                            }
                            if (data === "offline") {
                                return '<span class="flag-offline" role="status">Offline ✖</span>';
                            }
                            if (data === "unknown") {
                                return '<span class="flag-unknown" role="status">Unknown ✖</span>';
                            }
                            return data;
                        }
                    },
                    { title: "Last Check In", data: "last_check_in_at" }
                ],
                initComplete: function () {
                    $('#solves thead th').attr('scope', 'col');
                }
            });
        },
        error: function (xhr, status, error) {
            console.error("Error fetching data:", error);
        }
    });
});
</script>
{% endblock %}
