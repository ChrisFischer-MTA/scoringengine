{% extends 'base.html' %}
{% block title %}Machine Status{% endblock %}

{% block head %}
<style>
  .status-pill {
    padding: 6px 14px;
    color: white;
    border-radius: 25px;
    font-weight: bold;
    text-align: center;
    min-width: 110px;
    display: inline-block;
  }

  .status-healthy { background: #08680d; }
  .status-compromised, .status-comp { background: #b30000; }
  .status-offline { background: #5f6368; }
  .status-unknown { background: #6c757d; }

  .flex-row {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-top: 20px;
  }

  .box-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .machine-name { font-weight: 600; }
  .team-line { font-size: 12px; opacity: 0.8; }

  table {
    margin: auto;
    border-collapse: collapse;
  }

  th, td {
    padding: 6px;
    text-align: center;
  }

  #backendError {
    display: none;
    background: #f39c12;
    color: white;
    padding: 8px;
    text-align: center;
    font-weight: bold;
    margin-bottom: 20px;
  }
</style>
{% endblock %}

{% block content %}

<h2 class="text-center">Active Machine Status</h2>

<!-- Backend error notification -->
<div id="backendError">Backend unavailable - displaying last known state</div>

<div class="flex-row"></div>

<h2 class="text-center">History</h2>
<table id="historyTable">
  <thead>
    <tr id="timeRow">
      <th>Machine</th>
    </tr>
  </thead>
  <tbody id="historyBody"></tbody>
</table>

<script>
/* ---------------- CONFIG ---------------- */

const MAX_COLUMNS = 10;
const UPDATE_INTERVAL = 30000; // 30 seconds for testing 1800000 for 30

// Boxes and currentStatus start empty and get initialized by api
let boxes = [];
let currentStatus = [];

function normalizeStatus(raw) {
  const s = String(raw || 'unknown').toLowerCase();
  if (['healthy', 'compromised', 'offline', 'unknown'].includes(s)) return s;
  return 'unknown';
}

function statusLabel(status) {
  const s = normalizeStatus(status);
  if (s === 'healthy') return 'Healthy';
  if (s === 'compromised') return 'Compromised';
  if (s === 'offline') return 'Offline';
  return 'Unknown';
}

// Start UI 
function init() {
  const active = document.querySelector('.flex-row');
  active.innerHTML = '';

  const left = document.createElement('div');
  const right = document.createElement('div');
  left.className = right.className = 'box-col';

  boxes.forEach((b, i) => {
    const div = document.createElement('div');
    div.id = `active-${i}`;
    div.innerHTML = `
      <div class="machine-name">${b.host}</div>
      <div class="team-line">Team ${b.team_id}</div>
      <span class="status-pill"></span>
    `;
    (i < boxes.length / 2 ? left : right).appendChild(div);
  });

  active.appendChild(left);
  active.appendChild(right);

  const body = document.getElementById('historyBody');
  body.innerHTML = '';
  boxes.forEach((b, i) => {
    const tr = document.createElement('tr');
    tr.dataset.index = i;
    tr.innerHTML = `
      <td>
        <div class="machine-name">${b.host}</div>
        <div class="team-line">Team ${b.team_id}</div>
      </td>
    `;
    body.appendChild(tr);
  });
}

// Render current status

function renderActive() {
  currentStatus.forEach((st, i) => {
    const pill = document.querySelector(`#active-${i} .status-pill`);
    if (!pill) return;
    const normalized = normalizeStatus(st);
    pill.className = `status-pill status-${normalized}`;
    pill.textContent = statusLabel(normalized);
  });
}

// Create banner if there is an error

function showErrorBanner() {
  document.getElementById('backendError').style.display = 'block';
}

function clearErrorBanner() {
  document.getElementById('backendError').style.display = 'none';
}

// fetch API 

async function fetchCurrentStatus() {
  try {
    const res = await fetch('/api/status', { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const json = await res.json();
    if (!json || !Array.isArray(json.data)) {
      throw new Error('Invalid /api/status response');
    }

    const machines = json.data
      .slice()
      .sort((a, b) => (a.team_id - b.team_id) || String(a.name || '').localeCompare(String(b.name || '')));

    const nextBoxes = machines.map(m => ({
      key: `${m.team_id}:${m.name || `machine-${m.id}`}`,
      host: m.name || `machine-${m.id}`,
      team_id: m.team_id
    }));

    if (
      boxes.length !== nextBoxes.length ||
      boxes.some((b, i) => b.key !== nextBoxes[i].key)
    ) {
      boxes = nextBoxes;
      currentStatus = new Array(boxes.length).fill('unknown');
      init();
    }

    currentStatus = machines.map(m => normalizeStatus(m.status));

    clearErrorBanner();
    renderActive();
    return true;
  } catch (err) {
    console.error('Backend error:', err);
    showErrorBanner();
    return false;
  }
}

// history creating new columns 

function addHistoryColumn() {
  const timestamp = new Date().toLocaleTimeString();
  const timeRow = document.getElementById('timeRow');

  const th = document.createElement('th');
  th.textContent = timestamp;
  timeRow.insertBefore(th, timeRow.children[1]);

  document.querySelectorAll('#historyBody tr').forEach((row, i) => {
    const td = document.createElement('td');
    const st = normalizeStatus(currentStatus[i]);
    td.className = `status-pill status-${st}`;
    td.textContent = statusLabel(st);
    row.insertBefore(td, row.children[1]);
  });

  while (timeRow.children.length > MAX_COLUMNS + 1) {
    timeRow.removeChild(timeRow.lastChild);
    document.querySelectorAll('#historyBody tr').forEach(row => {
      row.removeChild(row.lastChild);
    });
  }
}

// Creating everything 

(async function main() {
  // Initial fetch + UI setup
  const ok = await fetchCurrentStatus();
  if (ok && currentStatus.length > 0) addHistoryColumn();

  // Periodic refresh + history update only if fetch succeeds
  setInterval(async () => {
    const success = await fetchCurrentStatus();
    if (success && currentStatus.length > 0) addHistoryColumn();
  }, UPDATE_INTERVAL);
})();
</script>

{% endblock %}
